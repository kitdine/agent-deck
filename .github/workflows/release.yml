name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Stable release tag whose Homebrew formula should be verified and proposed
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: write
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require an arm64 runner
        run: test "$(uname -m)" = arm64
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install fish
        # scripts/test-completion-install.sh (via make release-verify ->
        # check-install) exercises fish completion install/uninstall; the
        # macos-15 runner image does not ship fish by default.
        run: brew install fish
      - name: Verify release
        run: make release-verify
      - name: Build release archives
        # Pin archive names to the tag so they always match the files uploaded
        # below, independent of the Makefile's git-describe version derivation.
        run: make release-archive VERSION="$GITHUB_REF_NAME"
      - name: Extract annotated release notes
        # actions/checkout may leave refs/tags/<tag> pointing at the peeled
        # commit for a tag event. Fetch the remote tag object into a private
        # ref and require it to be annotated before extracting its message.
        run: |
          bash scripts/release-notes-from-tag.sh \
            origin "$GITHUB_REF_NAME" "$GITHUB_SHA" "$RUNNER_TEMP/release-notes.md"
      - name: Publish GitHub Release
        # A tag with a semver prerelease identifier (e.g. v0.1.0-rc.1) is
        # published as a GitHub prerelease so it never displays as the
        # repository's "Latest release" ahead of the stable tag it validates.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prerelease_flag=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease_flag=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            "dist/agentdeck_${GITHUB_REF_NAME}_darwin_arm64.tar.gz" \
            "dist/agentdeck_${GITHUB_REF_NAME}_darwin_amd64.tar.gz" \
            "dist/agentdeck_${GITHUB_REF_NAME}_checksums.txt" \
            --verify-tag \
            --title "AgentDeck $GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            "${prerelease_flag[@]}"

  homebrew:
    if: >-
      ${{ always() &&
          ((github.event_name == 'push' && needs.release.result == 'success' && !contains(github.ref_name, '-')) ||
           github.event_name == 'workflow_dispatch') }}
    needs: release
    permissions:
      contents: read
    runs-on: macos-15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out AgentDeck
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install fish
        run: brew install fish
      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$RELEASE_TAG" \
            --pattern "agentdeck_${RELEASE_TAG}_checksums.txt" \
            --dir "$RUNNER_TEMP"
      - name: Render Homebrew formula
        run: |
          bash scripts/render-homebrew-formula.sh \
            packaging/homebrew/agentdeck.rb.tmpl \
            "$RELEASE_TAG" \
            "$RUNNER_TEMP/agentdeck_${RELEASE_TAG}_checksums.txt" \
            "$RUNNER_TEMP/agentdeck.rb"
      - name: Verify Homebrew install and completions
        run: |
          test_tap="agentdeck/release-${GITHUB_RUN_ID}"
          brew tap-new "$test_tap"
          cp "$RUNNER_TEMP/agentdeck.rb" "$(brew --repository "$test_tap")/Formula/agentdeck.rb"
          brew install "$test_tap/agentdeck"
          brew test "$test_tap/agentdeck"

          formula_prefix=$(brew --prefix "$test_tap/agentdeck")
          bash_completion="$formula_prefix/etc/bash_completion.d/agentdeck"
          zsh_completion="$formula_prefix/share/zsh/site-functions/_agentdeck"
          fish_completion="$formula_prefix/share/fish/vendor_completions.d/agentdeck.fish"
          test -f "$bash_completion"
          test -f "$zsh_completion"
          test -f "$fish_completion"
          bash --noprofile --norc -c 'source "$1"; complete -p agentdeck >/dev/null' _ "$bash_completion"
          zsh -f -c 'autoload -Uz compinit; compinit -d "$2"; source "$1"; whence _agentdeck >/dev/null' \
            _ "$zsh_completion" "$RUNNER_TEMP/zcompdump"
          fish --no-config -c 'source $argv[1]; complete -C "agentdeck " >/dev/null' "$fish_completion"
      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: kitdine/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Open formula update pull request
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          bash scripts/update-homebrew-tap-pr.sh \
            homebrew-tap "$RUNNER_TEMP/agentdeck.rb" "$RELEASE_TAG"
